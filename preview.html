<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // DARK MODE LOGIKASI
        tailwind.config = { darkMode: 'class' }
        
        function setTheme(theme) {
            if (theme === 'system') {
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.removeItem('theme');
            } else if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            }
        }

        // Sahifa yuklanganda mavjud sozlamani tekshirish
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        .card-bg { width: 600px; height: 350px; position: relative; overflow: hidden; }
        .orange-wave { position: absolute; right: 0; top: 0; height: 100%; width: 45%; background: linear-gradient(135deg, #f97316, #fb923c); clip-path: ellipse(100% 100% at 100% 50%); }
    </style>
</head>
<body class="bg-gray-100 dark:bg-zinc-900 flex flex-col items-center justify-center min-h-screen p-4 font-sans transition-colors duration-300">

    <div class="fixed top-6 bg-white dark:bg-zinc-800 shadow-xl rounded-full px-6 py-3 flex gap-6 border border-gray-100 dark:border-zinc-700 mb-10">
        <button onclick="setTheme('light')" class="text-xs font-black uppercase tracking-widest text-orange-500 hover:scale-110 transition">☀️ Kun</button>
        <button onclick="setTheme('dark')" class="text-xs font-black uppercase tracking-widest text-blue-400 hover:scale-110 transition">🌙 Tun</button>
        <button onclick="setTheme('system')" class="text-xs font-black uppercase tracking-widest text-gray-400 hover:scale-110 transition">💻 Tizim</button>
    </div>

    <div id="content" class="hidden card-bg shadow-2xl rounded-xl flex p-12 bg-white dark:bg-zinc-800 border border-white dark:border-zinc-700 mt-20">
        <div class="w-[60%] z-10">
            <h1 id="vName" class="text-4xl font-bold uppercase tracking-tighter mb-1 text-gray-800 dark:text-white"></h1>
            <p id="vJob" class="text-lg text-gray-400 mb-10 italic"></p>
            <div class="space-y-3 text-sm font-medium text-gray-600 dark:text-gray-300">
                <p>📍 <span id="vAddr"></span></p>
                <div class="h-[1px] bg-gray-100 dark:bg-zinc-700 w-40"></div>
                <p>📞 <span id="vPhone"></span></p>
                <div class="h-[1px] bg-gray-100 dark:bg-zinc-700 w-40"></div>
                <p>✉️ <span id="vEmail"></span></p>
                <div class="h-[1px] bg-gray-100 dark:bg-zinc-700 w-40"></div>
                <p>🌐 <span id="vWeb"></span></p>
            </div>
        </div>
        <div class="orange-wave"></div>
        <div class="w-[40%] z-10 flex flex-col items-end justify-between py-2">
            <div id="qrcode" class="bg-white p-2 rounded-lg shadow-xl border-4 border-white"></div>
            <div class="text-white text-right">
                <div id="logoBox" class="mb-1 flex justify-end"></div>
                <p class="text-[7px] uppercase tracking-[0.2em] opacity-70">Digital Business Card</p>
            </div>
        </div>
    </div>

    <div id="blocked" class="hidden w-full max-w-sm bg-white dark:bg-zinc-800 p-10 rounded-[50px] shadow-2xl text-center border-t-8 border-orange-500 mt-20">
        <h2 id="bTitle" class="text-xl font-black text-orange-600 mb-2 uppercase italic">Aktivatsiya!</h2>
        <p class="text-[10px] text-gray-400 dark:text-gray-500 mb-8 font-bold uppercase italic">Faqat **** <span id="userLast4" class="text-orange-500 text-lg"></span> kartadan!</p>
        <p id="bPrice" class="text-4xl font-black mb-8 dark:text-white">1,000 <span class="text-sm font-normal">UZS</span></p>
        <div class="grid grid-cols-2 gap-3">
            <button class="bg-blue-600 text-white py-5 rounded-2xl font-black text-xs shadow-lg shadow-blue-500/20">CLICK</button>
            <button class="bg-cyan-500 text-black py-5 rounded-2xl font-black text-xs shadow-lg shadow-cyan-500/20">PAYME</button>
        </div>
    </div>

    <script>
        const uId = new URLSearchParams(window.location.search).get('id');
        async function load() {
            try {
                const res = await fetch(`http://localhost:5000/api/user/${uId}`);
                const r = await res.json();
                const u = r.data;
                if (r.isBlocked) {
                    document.getElementById('blocked').classList.remove('hidden');
                    document.getElementById('userLast4').innerText = u.last4;
                    if(u.isActive) {
                        document.getElementById('bTitle').innerText = "MUDDAT TUGADI!";
                        document.getElementById('bPrice').innerHTML = '14,000 <span class="text-sm">UZS</span>';
                    }
                } else {
                    document.getElementById('content').classList.remove('hidden');
                    document.getElementById('vName').innerText = u.name;
                    document.getElementById('vJob').innerText = u.job;
                    document.getElementById('vAddr').innerText = `${u.company}, ${u.address}`;
                    document.getElementById('vPhone').innerText = u.phone;
                    document.getElementById('vEmail').innerText = u.email;
                    document.getElementById('vWeb').innerText = u.web;
                    document.getElementById('logoBox').innerHTML = u.logo ? `<img src="http://localhost:5000${u.logo}" class="max-h-16">` : `<p class="text-3xl font-black italic">LOGO</p>`;
                    new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 90, height: 90 });
                }
            } catch(e) { console.log(e); }
        }
        if(uId) load();
    </script>
</body>
</html>
